<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#FF6B00">
  <title>Admin — Knox Knows</title>
  <link rel="icon" type="image/jpeg" href="/knox-logo-square.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange:        #FF6B00;
      --orange-dark:   #CC5500;
      --orange-light:  #FFE0C2;
      --orange-cream:  #FFF8F0;
      --blue:          #1CB0F6;
      --blue-dark:     #0A85C2;
      --blue-light:    #D7F2FD;
      --green:         #58CC02;
      --green-dark:    #46A302;
      --green-light:   #D7FFB8;
      --red:           #FF4B4B;
      --red-light:     #FEE2E2;
      --yellow:        #FFD900;
      --purple:        #CE82FF;
      --purple-light:  #F3E8FF;
      --cream:         #FFF8F0;
      --gray:          #F7F7F7;
      --border:        #E5E5E5;
      --text:          #3C3C3C;
      --text-light:    #777;
    }
    html, body {
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      background: var(--gray);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: var(--orange); text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* ─── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--orange);
      border-bottom: 4px solid var(--orange-dark);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
      position: sticky; top: 0; z-index: 50;
    }
    .h-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .h-logo {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 3px solid white;
      object-fit: cover;
      background: var(--orange-light);
    }
    .h-title {
      display: flex; flex-direction: column;
      line-height: 1.1;
    }
    .h-title-main {
      font-size: 17px; font-weight: 900;
      color: white;
      letter-spacing: -0.01em;
    }
    .h-title-sub {
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .h-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .h-btn {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      color: white;
      border-radius: 12px;
      padding: 9px 16px;
      font-size: 13px; font-weight: 800;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .h-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }
    .h-btn:active { transform: translateY(1px); }
    .h-status {
      font-size: 11px; font-weight: 800;
      color: white;
      background: rgba(255,255,255,0.15);
      padding: 6px 12px;
      border-radius: 999px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .h-status.live::before {
      content: '';
      display: inline-block;
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: 1px;
      box-shadow: 0 0 0 0 rgba(74,222,128,0.6);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
      70%  { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }

    /* ─── LAYOUT ─────────────────────────────────────────── */
    main { max-width: 1280px; margin: 0 auto; padding: 28px 24px 60px; }

    .section-title {
      font-size: 13px; font-weight: 900;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 32px 0 14px;
    }
    .section-title:first-child { margin-top: 0; }

    .grid {
      display: grid;
      gap: 16px;
    }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }

    /* ─── METRIC CARDS ─────────────────────────────────────── */
    .card {
      background: white;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 4px 0 var(--border);
    }
    .card-lg { padding: 22px 24px; }

    .metric-card {
      background: white;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 4px 0 var(--border);
      transition: transform 0.15s;
    }
    .metric-card:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--border); }
    .metric-label {
      font-size: 11px; font-weight: 900;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .metric-value {
      font-size: 32px; font-weight: 900;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .metric-sub {
      font-size: 12px; font-weight: 700;
      color: var(--text-light);
      margin-top: 6px;
    }
    .metric-card.orange { border-color: var(--orange-light); box-shadow: 0 4px 0 var(--orange-light); background: linear-gradient(135deg, white, #FFF8F0); }
    .metric-card.orange .metric-value { color: var(--orange); }
    .metric-card.green  { border-color: #B9F6CA;             box-shadow: 0 4px 0 #B9F6CA;             background: linear-gradient(135deg, white, #F0FFF0); }
    .metric-card.green  .metric-value { color: var(--green-dark); }
    .metric-card.blue   { border-color: var(--blue-light);   box-shadow: 0 4px 0 var(--blue-light);   background: linear-gradient(135deg, white, #F0FAFF); }
    .metric-card.blue   .metric-value { color: var(--blue-dark); }
    .metric-card.purple { border-color: var(--purple-light); box-shadow: 0 4px 0 var(--purple-light); background: linear-gradient(135deg, white, #FAF5FF); }
    .metric-card.purple .metric-value { color: var(--purple); }

    .metric-delta {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 900;
      padding: 3px 8px;
      border-radius: 999px;
      margin-top: 6px;
    }
    .metric-delta.up   { background: var(--green-light); color: var(--green-dark); }
    .metric-delta.down { background: var(--red-light);   color: var(--red); }
    .metric-delta.flat { background: var(--gray);        color: var(--text-light); }

    /* ─── PROGRESS BARS ───────────────────────────────────── */
    .bar-row { margin-bottom: 14px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }
    .bar-label-value { font-size: 12px; color: var(--text-light); font-weight: 700; }
    .bar-track {
      width: 100%;
      height: 10px;
      background: var(--gray);
      border-radius: 999px;
      overflow: hidden;
      border: 1.5px solid var(--border);
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .bar-fill.orange { background: linear-gradient(90deg, var(--orange), #FF8C42); }
    .bar-fill.green  { background: linear-gradient(90deg, var(--green),  #7BE036); }
    .bar-fill.blue   { background: linear-gradient(90deg, var(--blue),   #5AC8FA); }
    .bar-fill.purple { background: linear-gradient(90deg, var(--purple), #DEA6FF); }
    .bar-fill.red    { background: linear-gradient(90deg, var(--red),    #FF7878); }

    /* ─── SIGNUP MINI-CHART ────────────────────────────── */
    .spark-wrap {
      display: flex; align-items: flex-end; gap: 4px;
      height: 80px;
      margin-top: 12px;
    }
    .spark-bar {
      flex: 1;
      background: linear-gradient(180deg, var(--orange), var(--orange-light));
      border-radius: 4px 4px 2px 2px;
      min-height: 2px;
      transition: height 0.6s cubic-bezier(0.16,1,0.3,1);
      position: relative;
      cursor: default;
    }
    .spark-bar:hover { background: linear-gradient(180deg, var(--orange-dark), var(--orange)); }
    .spark-bar:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%; left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      margin-bottom: 6px;
      pointer-events: none;
    }
    .spark-x-labels {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .spark-x-label {
      flex: 1;
      font-size: 9px;
      color: var(--text-light);
      text-align: center;
      font-weight: 700;
    }

    /* ─── FEEDBACK SCORE RING ───────────────────────── */
    .score-ring-wrap {
      display: flex; align-items: center; gap: 24px;
      flex-wrap: wrap;
    }
    .score-ring {
      position: relative;
      width: 140px; height: 140px;
      flex-shrink: 0;
    }
    .score-ring svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .score-ring-bg { fill: none; stroke: var(--gray); stroke-width: 12; }
    .score-ring-fill { fill: none; stroke: var(--green); stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 0.9s cubic-bezier(0.16,1,0.3,1); }
    .score-ring-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      line-height: 1;
    }
    .score-ring-pct { font-size: 28px; font-weight: 900; color: var(--text); letter-spacing: -0.02em; }
    .score-ring-label { font-size: 10px; font-weight: 900; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
    .score-summary { flex: 1; min-width: 200px; }
    .score-stat {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1.5px solid var(--border);
      font-size: 14px;
    }
    .score-stat:last-child { border-bottom: none; }
    .score-stat-label { font-weight: 700; color: var(--text-light); }
    .score-stat-value { font-weight: 900; color: var(--text); }
    .score-stat-value.up   { color: var(--green-dark); }
    .score-stat-value.down { color: var(--red); }

    /* ─── TABLES ──────────────────────────────────────── */
    .data-list { display: flex; flex-direction: column; gap: 8px; max-height: 460px; overflow-y: auto; padding-right: 4px; }
    .data-list::-webkit-scrollbar { width: 8px; }
    .data-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    .data-row {
      background: var(--gray);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      transition: border-color 0.15s;
    }
    .data-row:hover { border-color: var(--orange-light); }
    .data-row-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .row-question {
      font-size: 13px; font-weight: 800;
      color: var(--text);
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .row-answer {
      font-size: 12px; font-weight: 600;
      color: var(--text-light);
      line-height: 1.5;
      margin-top: 4px;
      word-break: break-word;
    }
    .tag {
      display: inline-block;
      font-size: 9px; font-weight: 900;
      padding: 3px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .tag-up    { background: var(--green-light); color: var(--green-dark); }
    .tag-down  { background: var(--red-light);   color: var(--red); }
    .tag-mode-answer { background: var(--orange-light); color: var(--orange); }
    .tag-mode-learn  { background: var(--blue-light);   color: var(--blue-dark); }
    .tag-mode-chat   { background: var(--purple-light); color: var(--purple); }
    .tag-plan-free   { background: var(--gray);          color: var(--text-light); border: 1.5px solid var(--border); }
    .tag-plan-super  { background: var(--green-light);   color: var(--green-dark); }
    .tag-plan-max    { background: var(--orange-light);  color: var(--orange); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-weight: 700;
      font-size: 14px;
    }
    .empty-state-emoji { font-size: 40px; margin-bottom: 12px; display: block; }

    /* ─── AUTH GATE ───────────────────────────────────── */
    #authGate {
      position: fixed; inset: 0;
      background: var(--orange-cream);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    #authGate .gate-card {
      background: white;
      border-radius: 24px;
      max-width: 380px;
      width: 100%;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    }
    .gate-header {
      background: var(--orange);
      border-bottom: 4px solid var(--orange-dark);
      padding: 32px 28px;
      text-align: center;
    }
    .gate-header img {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 3px solid white;
      margin: 0 auto 10px;
      object-fit: cover;
      display: block;
    }
    .gate-header h1 {
      font-size: 22px; font-weight: 900;
      color: white;
      letter-spacing: -0.01em;
    }
    .gate-header p {
      font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,0.85);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .gate-body {
      padding: 24px 28px 28px;
      text-align: center;
    }
    .gate-msg {
      font-size: 14px; font-weight: 700;
      color: var(--text-light);
      line-height: 1.55;
      margin-bottom: 18px;
    }
    .gate-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: var(--orange);
      color: white;
      font-size: 14px; font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      box-shadow: 0 4px 0 var(--orange-dark);
      transition: all 0.15s;
    }
    .gate-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 0 var(--orange-dark); }
    .gate-btn:active { transform: translateY(2px);  box-shadow: none; }

    /* ─── LOADING ──────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      padding: 80px 20px;
      gap: 12px;
      color: var(--text-light);
      font-weight: 800;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── ERROR ──────────────────────────────────────── */
    .error-banner {
      background: #FEF2F2;
      border: 2px solid #FECACA;
      border-radius: 16px;
      padding: 16px 20px;
      color: var(--red);
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* ─── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 900px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      header { padding: 12px 14px; }
      .h-title-main { font-size: 15px; }
      .h-title-sub  { font-size: 10px; }
      main { padding: 20px 14px 50px; }
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
      .metric-value { font-size: 26px; }
      .score-ring { width: 120px; height: 120px; }
      .score-ring-pct { font-size: 24px; }
    }
  </style>
</head>
<body>

<!-- ─── AUTH GATE — shown until admin auth resolves ─── -->
<div id="authGate">
  <div class="gate-card">
    <div class="gate-header">
      <img src="/knox-logo-square.jpg" alt="Knox" onerror="this.style.display='none'">
      <h1>Admin Console</h1>
      <p>Restricted Access</p>
    </div>
    <div class="gate-body">
      <p class="gate-msg" id="gateMsg">Checking authentication…</p>
      <button class="gate-btn" id="gateBtn" style="display:none;" onclick="handleGateSignIn()">Sign in with Google</button>
    </div>
  </div>
</div>

<!-- ─── DASHBOARD — hidden until auth + data load ─── -->
<header style="display:none;" id="adminHeader">
  <div class="h-left">
    <img src="/knox-logo-square.jpg" alt="Knox" class="h-logo" onerror="this.style.display='none'">
    <div class="h-title">
      <span class="h-title-main">Knox Knows</span>
      <span class="h-title-sub">Admin Console</span>
    </div>
  </div>
  <div class="h-right">
    <span class="h-status live" id="lastUpdated">Loading…</span>
    <button class="h-btn" onclick="loadStats(true)">↻ Refresh</button>
    <button class="h-btn" onclick="handleSignOut()">Sign out</button>
  </div>
</header>

<main style="display:none;" id="adminMain">
  <div id="errorBanner" style="display:none;" class="error-banner"></div>
  <div id="dashboard"></div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut,
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAlu0ARxOD4kmtRSuEoVJaqCDh4lr4_h9E",
    authDomain:        "knox-knows.firebaseapp.com",
    projectId:         "knox-knows",
    storageBucket:     "knox-knows.firebasestorage.app",
    messagingSenderId: "217543758511",
    appId:             "1:217543758511:web:f5451b30eea1918caa3a5a",
  };
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window._auth = auth;

  // Wait for auth state
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      // Not signed in
      document.getElementById('gateMsg').textContent =
        'Sign in with the admin Google account to continue.';
      document.getElementById('gateBtn').style.display = 'block';
      return;
    }
    // Signed in — try loading stats. If 403, they're not the admin.
    await loadStats();
  });

  window.handleGateSignIn = async function() {
    document.getElementById('gateMsg').textContent = 'Opening Google sign in…';
    document.getElementById('gateBtn').style.display = 'none';
    try {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
      // onAuthStateChanged will fire and call loadStats
    } catch (err) {
      document.getElementById('gateMsg').textContent =
        'Sign in cancelled or failed. Try again.';
      document.getElementById('gateBtn').style.display = 'block';
    }
  };

  window.handleSignOut = async function() {
    await signOut(auth);
    location.reload();
  };

  window.loadStats = async function(isRefresh) {
    const dash    = document.getElementById('dashboard');
    const errBan  = document.getElementById('errorBanner');
    const adminHeader = document.getElementById('adminHeader');
    const adminMain   = document.getElementById('adminMain');
    const gate    = document.getElementById('authGate');
    errBan.style.display = 'none';

    if (!isRefresh) {
      dash.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div>Loading stats…</div>
        </div>`;
    }

    let token;
    try {
      token = await auth.currentUser.getIdToken();
    } catch (err) {
      document.getElementById('gateMsg').textContent =
        'Could not get auth token. Please sign in again.';
      document.getElementById('gateBtn').style.display = 'block';
      gate.style.display = 'flex';
      adminHeader.style.display = 'none';
      adminMain.style.display = 'none';
      return;
    }

    let data;
    try {
      const res = await fetch('/api/admin-stats', {
        headers: { 'Authorization': 'Bearer ' + token },
      });

      if (res.status === 403) {
        document.getElementById('gateMsg').textContent =
          'This account does not have admin access.';
        document.getElementById('gateBtn').style.display = 'none';
        const out = document.createElement('button');
        out.className = 'gate-btn';
        out.style.background = '#9CA3AF';
        out.style.boxShadow  = '0 4px 0 #6B7280';
        out.style.marginTop  = '12px';
        out.textContent = 'Sign out';
        out.onclick = handleSignOut;
        document.querySelector('.gate-body').appendChild(out);
        return;
      }

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || `HTTP ${res.status}`);
      }
      data = await res.json();
    } catch (err) {
      gate.style.display = 'none';
      adminHeader.style.display = 'flex';
      adminMain.style.display   = 'block';
      errBan.style.display = 'block';
      errBan.textContent = '❗ ' + (err.message || 'Failed to load stats');
      dash.innerHTML = '';
      return;
    }

    // Reveal dashboard
    gate.style.display = 'none';
    adminHeader.style.display = 'flex';
    adminMain.style.display   = 'block';

    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date(data.generatedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    renderDashboard(data);
  };

  function fmt(n) {
    if (n == null) return '—';
    return Number(n).toLocaleString();
  }
  function fmtPct(n) {
    if (n == null) return '—';
    return (Math.round(n * 10) / 10) + '%';
  }
  function fmtMoney(n) {
    if (n == null) return '—';
    return '$' + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function escHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function relTime(ts) {
    if (!ts) return '—';
    const diff = Date.now() - ts;
    const sec  = Math.floor(diff / 1000);
    if (sec < 60)   return sec + 's ago';
    const min = Math.floor(sec / 60);
    if (min < 60)   return min + 'm ago';
    const hr  = Math.floor(min / 60);
    if (hr  < 24)   return hr + 'h ago';
    const dy  = Math.floor(hr / 24);
    if (dy  < 30)   return dy + 'd ago';
    return new Date(ts).toLocaleDateString();
  }

  function renderDashboard(data) {
    const dash = document.getElementById('dashboard');
    const { users, feedback, usage, revenue } = data;

    // ─── REVENUE (if Stripe configured) ───
    let revenueHtml = '';
    if (revenue && !revenue.error) {
      revenueHtml = `
        <h2 class="section-title">Revenue</h2>
        <div class="grid grid-4">
          <div class="metric-card orange">
            <div class="metric-label">MRR</div>
            <div class="metric-value">${escHtml(fmtMoney(revenue.mrr))}</div>
            <div class="metric-sub">Monthly recurring revenue</div>
          </div>
          <div class="metric-card green">
            <div class="metric-label">Active subs</div>
            <div class="metric-value">${fmt(revenue.activeSubscriptions)}</div>
            <div class="metric-sub">Paid &amp; active</div>
          </div>
          <div class="metric-card blue">
            <div class="metric-label">In trial</div>
            <div class="metric-value">${fmt(revenue.trialingSubscriptions)}</div>
            <div class="metric-sub">Free trial period</div>
          </div>
          <div class="metric-card ${revenue.pastDueSubscriptions > 0 ? '' : 'purple'}" ${revenue.pastDueSubscriptions > 0 ? 'style="border-color:#FECACA;box-shadow:0 4px 0 #FECACA;background:linear-gradient(135deg,white,#FEF2F2);"' : ''}>
            <div class="metric-label">Past due</div>
            <div class="metric-value" ${revenue.pastDueSubscriptions > 0 ? 'style="color:var(--red);"' : ''}>${fmt(revenue.pastDueSubscriptions)}</div>
            <div class="metric-sub">Failed payment</div>
          </div>
        </div>
        ${revenue.byPlan && Object.values(revenue.byPlan).some(v => v > 0) ? `
        <div class="card-lg card" style="margin-top:16px;">
          <div class="metric-label">Active subscriptions by plan</div>
          <div style="margin-top:14px;">
            ${revPlanBars(revenue.byPlan)}
          </div>
        </div>` : ''}
      `;
    } else if (revenue && revenue.error) {
      revenueHtml = `
        <h2 class="section-title">Revenue</h2>
        <div class="card-lg card empty-state">
          <span class="empty-state-emoji">💳</span>
          Revenue stats unavailable — ${escHtml(revenue.error)}
        </div>`;
    }

    // ─── USERS ───
    const maxSignup = Math.max(1, ...users.signupSeries.map(d => d.count));
    const usersHtml = `
      <h2 class="section-title">Users &amp; growth</h2>
      <div class="grid grid-4">
        <div class="metric-card orange">
          <div class="metric-label">Total users</div>
          <div class="metric-value">${fmt(users.total)}</div>
          <div class="metric-sub">All-time signups</div>
        </div>
        <div class="metric-card green">
          <div class="metric-label">New today</div>
          <div class="metric-value">${fmt(users.newToday)}</div>
          <div class="metric-sub">${fmt(users.newThisWeek)} this week</div>
        </div>
        <div class="metric-card blue">
          <div class="metric-label">Active today</div>
          <div class="metric-value">${fmt(users.activeToday)}</div>
          <div class="metric-sub">${fmt(users.activeThisWeek)} this week (WAU)</div>
        </div>
        <div class="metric-card purple">
          <div class="metric-label">Conversion</div>
          <div class="metric-value">${fmtPct(users.conversionPct)}</div>
          <div class="metric-sub">${fmt(users.paying)} paying users</div>
        </div>
      </div>

      <div class="grid grid-2" style="margin-top:16px;">
        <div class="card-lg card">
          <div class="metric-label">Signups, last 14 days</div>
          <div class="spark-wrap">
            ${users.signupSeries.map(d => `
              <div class="spark-bar" data-tooltip="${escHtml(d.date)} · ${d.count} new"
                   style="height:${Math.max(2, (d.count / maxSignup) * 100)}%;"></div>
            `).join('')}
          </div>
          <div class="spark-x-labels">
            ${users.signupSeries.map((d, i) => {
              const day = new Date(d.date).getDate();
              return `<div class="spark-x-label">${(i % 2 === 0) ? day : ''}</div>`;
            }).join('')}
          </div>
        </div>
        <div class="card-lg card">
          <div class="metric-label">Plan distribution</div>
          <div style="margin-top:14px;">
            ${planBar('Free',       users.byPlan.free,  users.total, 'orange')}
            ${planBar('Super Knox', users.byPlan.super, users.total, 'green')}
            ${planBar('Max Knox',   users.byPlan.max,   users.total, 'purple')}
          </div>
        </div>
      </div>
    `;

    // ─── FEEDBACK ───
    const score        = feedback.positivePct;
    const ringCirc     = 2 * Math.PI * 54;        // r=54
    const ringFill     = ringCirc * (1 - score/100);
    const ringColor    = score >= 80 ? 'var(--green)'
                       : score >= 60 ? 'var(--orange)'
                       : 'var(--red)';
    const feedbackHtml = `
      <h2 class="section-title">Feedback &amp; quality</h2>
      <div class="grid grid-2">
        <div class="card-lg card">
          <div class="metric-label">Overall satisfaction</div>
          <div class="score-ring-wrap" style="margin-top:14px;">
            <div class="score-ring">
              <svg viewBox="0 0 120 120">
                <circle class="score-ring-bg"   cx="60" cy="60" r="54"></circle>
                <circle class="score-ring-fill" cx="60" cy="60" r="54"
                  style="stroke:${ringColor};stroke-dasharray:${ringCirc};stroke-dashoffset:${ringFill};"></circle>
              </svg>
              <div class="score-ring-text">
                <span class="score-ring-pct">${fmtPct(score)}</span>
                <span class="score-ring-label">Positive</span>
              </div>
            </div>
            <div class="score-summary">
              <div class="score-stat">
                <span class="score-stat-label">👍 Total up</span>
                <span class="score-stat-value up">${fmt(feedback.up)}</span>
              </div>
              <div class="score-stat">
                <span class="score-stat-label">👎 Total down</span>
                <span class="score-stat-value down">${fmt(feedback.down)}</span>
              </div>
              <div class="score-stat">
                <span class="score-stat-label">Today</span>
                <span class="score-stat-value">${fmt(feedback.upToday)} 👍 / ${fmt(feedback.downToday)} 👎</span>
              </div>
              <div class="score-stat">
                <span class="score-stat-label">This week</span>
                <span class="score-stat-value">${fmt(feedback.upWeek)} 👍 / ${fmt(feedback.downWeek)} 👎</span>
              </div>
            </div>
          </div>
        </div>
        <div class="card-lg card">
          <div class="metric-label">Satisfaction by mode</div>
          <div style="margin-top:14px;">
            ${modeBar('Answer', feedback.byMode.answer, 'orange')}
            ${modeBar('Learn',  feedback.byMode.learn,  'blue')}
            ${modeBar('Chat',   feedback.byMode.chat,   'purple')}
          </div>
          <div class="metric-label" style="margin-top:22px;">Satisfaction by plan</div>
          <div style="margin-top:14px;">
            ${modeBar('Free',  feedback.byPlan.free,  'orange')}
            ${modeBar('Super', feedback.byPlan.super, 'green')}
            ${modeBar('Max',   feedback.byPlan.max,   'purple')}
          </div>
        </div>
      </div>

      <div class="grid grid-2" style="margin-top:16px;">
        <div class="card-lg card">
          <div class="metric-label">👎 Worst-rated answers (fix these prompts)</div>
          <div class="data-list" style="margin-top:14px;">
            ${feedback.worstAnswers.length === 0
              ? `<div class="empty-state"><span class="empty-state-emoji">🎉</span>No negative feedback yet — Knox is doing great.</div>`
              : feedback.worstAnswers.map(f => `
                <div class="data-row">
                  <div class="data-row-header">
                    <span class="tag tag-down">👎 Down</span>
                    <span class="tag tag-mode-${f.mode || 'answer'}">${escHtml(f.mode || 'answer')}</span>
                    <span class="tag tag-plan-${f.plan || 'free'}">${escHtml((f.plan || 'free').toUpperCase())}</span>
                    <span style="font-size:11px;font-weight:700;color:var(--text-light);margin-left:auto;">${relTime(f.ts)}</span>
                  </div>
                  <div class="row-question">${escHtml(f.question || '—')}</div>
                  <div class="row-answer">${escHtml(f.answer || '')}</div>
                </div>
              `).join('')}
          </div>
        </div>
        <div class="card-lg card">
          <div class="metric-label">Recent feedback activity</div>
          <div class="data-list" style="margin-top:14px;">
            ${feedback.recentFeedback.length === 0
              ? `<div class="empty-state"><span class="empty-state-emoji">📭</span>No feedback yet.</div>`
              : feedback.recentFeedback.map(f => `
                <div class="data-row">
                  <div class="data-row-header">
                    <span class="tag ${f.rating === 1 ? 'tag-up' : 'tag-down'}">${f.rating === 1 ? '👍' : '👎'}</span>
                    <span class="tag tag-mode-${f.mode || 'answer'}">${escHtml(f.mode || 'answer')}</span>
                    <span class="tag tag-plan-${f.plan || 'free'}">${escHtml((f.plan || 'free').toUpperCase())}</span>
                    <span style="font-size:11px;font-weight:700;color:var(--text-light);margin-left:auto;">${relTime(f.ts)}</span>
                  </div>
                  <div class="row-question">${escHtml(f.question || '—')}</div>
                </div>
              `).join('')}
          </div>
        </div>
      </div>
    `;

    // ─── USAGE ───
    const usageHtml = `
      <h2 class="section-title">Today's usage</h2>
      <div class="grid grid-4">
        <div class="metric-card orange">
          <div class="metric-label">Questions today</div>
          <div class="metric-value">${fmt(usage.questionsToday)}</div>
          <div class="metric-sub">Across all users</div>
        </div>
        <div class="metric-card blue">
          <div class="metric-label">Active users</div>
          <div class="metric-value">${fmt(usage.usersWithActivityToday)}</div>
          <div class="metric-sub">Asked ≥1 question today</div>
        </div>
        <div class="metric-card green">
          <div class="metric-label">Avg per user</div>
          <div class="metric-value">${fmt(usage.avgQuestionsPerActiveUser)}</div>
          <div class="metric-sub">Questions per active user</div>
        </div>
        <div class="metric-card purple">
          <div class="metric-label">Most popular mode</div>
          <div class="metric-value" style="font-size:24px;">${escHtml(topMode(usage.byModeToday))}</div>
          <div class="metric-sub">Today's leader</div>
        </div>
      </div>

      <div class="card-lg card" style="margin-top:16px;">
        <div class="metric-label">Today's questions by mode</div>
        <div style="margin-top:14px;">
          ${usageBar('Answer (HW)', usage.byModeToday.answer, usage.questionsToday, 'orange')}
          ${usageBar('Learn',       usage.byModeToday.learn,  usage.questionsToday, 'blue')}
          ${usageBar('Chat',        usage.byModeToday.chat,   usage.questionsToday, 'purple')}
        </div>
      </div>
    `;

    dash.innerHTML = revenueHtml + usersHtml + feedbackHtml + usageHtml;
  }

  // ─── Render helpers ───
  function planBar(label, count, total, color) {
    const pct = total > 0 ? (count / total) * 100 : 0;
    return `
      <div class="bar-row">
        <div class="bar-label">
          <span>${escHtml(label)}</span>
          <span class="bar-label-value">${fmt(count)} · ${fmtPct(pct)}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${color}" style="width:${pct}%;"></div>
        </div>
      </div>`;
  }

  function modeBar(label, stats, color) {
    const total = stats.up + stats.down;
    const pct   = total > 0 ? (stats.up / total) * 100 : 0;
    return `
      <div class="bar-row">
        <div class="bar-label">
          <span>${escHtml(label)}</span>
          <span class="bar-label-value">${fmt(stats.up)} 👍 / ${fmt(stats.down)} 👎 · ${total > 0 ? fmtPct(pct) : '—'}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${color}" style="width:${pct}%;"></div>
        </div>
      </div>`;
  }

  function usageBar(label, count, total, color) {
    const pct = total > 0 ? (count / total) * 100 : 0;
    return `
      <div class="bar-row">
        <div class="bar-label">
          <span>${escHtml(label)}</span>
          <span class="bar-label-value">${fmt(count)} questions · ${fmtPct(pct)}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${color}" style="width:${pct}%;"></div>
        </div>
      </div>`;
  }

  function revPlanBars(byPlan) {
    const items = [
      ['Super Monthly', byPlan.super_monthly, 'orange'],
      ['Super Yearly',  byPlan.super_yearly,  'green'],
      ['Max Monthly',   byPlan.max_monthly,   'blue'],
      ['Max Yearly',    byPlan.max_yearly,    'purple'],
    ];
    const total = items.reduce((s, [, n]) => s + n, 0) || 1;
    return items.map(([label, n, c]) => `
      <div class="bar-row">
        <div class="bar-label">
          <span>${escHtml(label)}</span>
          <span class="bar-label-value">${fmt(n)} · ${fmtPct((n / total) * 100)}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${c}" style="width:${(n / total) * 100}%;"></div>
        </div>
      </div>
    `).join('');
  }

  function topMode(byModeToday) {
    const entries = Object.entries(byModeToday).sort((a, b) => b[1] - a[1]);
    if (!entries[0] || entries[0][1] === 0) return '—';
    const labels = { answer: 'Answer', learn: 'Learn', chat: 'Chat' };
    return labels[entries[0][0]] || entries[0][0];
  }
</script>

</body>
</html>
