<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Knox — Extension</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', system-ui, sans-serif; background: linear-gradient(180deg,#fff,#FFF8F0); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: white; border: 1.5px solid #ECECEC; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); padding: 40px; max-width: 420px; width: 100%; text-align: center; }
    .fox { width: 88px; height: 88px; border-radius: 50%; border: 4px solid white; box-shadow: 0 12px 32px rgba(255,107,0,0.25); margin-bottom: 16px; }
    h1 { font-size: 26px; font-weight: 900; color: #1A1A1A; letter-spacing: -0.02em; }
    p { font-size: 15px; font-weight: 600; color: #5A5F6A; line-height: 1.55; margin: 10px 0 24px; }
    .btn { width: 100%; font-family: inherit; font-weight: 800; font-size: 16px; padding: 15px; border-radius: 14px; border: none; cursor: pointer; margin-bottom: 12px; }
    .btn-google { background: white; color: #1A1A1A; border: 1.5px solid #ECECEC; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { border-color: #D0D0D0; }
    .divider { display: flex; align-items: center; gap: 12px; color: #9AA0AB; font-size: 13px; font-weight: 700; margin: 8px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1.5px; background: #ECECEC; }
    input { width: 100%; font-family: inherit; font-size: 15px; font-weight: 600; padding: 13px 16px; border: 1.5px solid #ECECEC; border-radius: 12px; margin-bottom: 10px; }
    input:focus { outline: none; border-color: #FF6B00; }
    .btn-primary { background: #FF6B00; color: white; box-shadow: 0 4px 0 #CC5500; }
    .btn-primary:active { transform: translateY(4px); box-shadow: none; }
    .err { color: #FF4B4B; font-size: 13px; font-weight: 700; margin-bottom: 10px; min-height: 18px; }
    .success { display: none; }
    .success h1 { color: #46A302; }
    .toggle { font-size: 13px; font-weight: 700; color: #9AA0AB; margin-top: 8px; }
    .toggle a { color: #FF6B00; cursor: pointer; text-decoration: none; font-weight: 900; }
  </style>
</head>
<body>
  <div class="card" id="signinCard">
    <img src="/knox-logo.jpg" alt="Knox" class="fox" onerror="this.style.display='none'">
    <h1 id="title">Sign in to Knox</h1>
    <p id="subtitle">Connect your account to use the Knox extension.</p>
    <div class="err" id="err"></div>

    <button class="btn btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button class="btn btn-primary" id="emailBtn">Sign in</button>
    <div class="toggle" id="toggle">New here? <a id="toggleLink">Create an account</a></div>
  </div>

  <div class="card success" id="successCard">
    <img src="/knox-logo.jpg" alt="Knox" class="fox" onerror="this.style.display='none'">
    <h1>You're in! 🦊</h1>
    <p>You can close this tab and head back to the Knox extension.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAlu0ARxOD4kmtRSuEoVJaqCDh4lr4_h9E",
      authDomain:        "knox-knows.firebaseapp.com",
      projectId:         "knox-knows",
      storageBucket:     "knox-knows.firebasestorage.app",
      messagingSenderId: "217543758511",
      appId:             "1:217543758511:web:f5451b30eea1918caa3a5a",
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // EXTENSION ID — replace after you load the extension in Chrome (chrome://extensions)
    const EXTENSION_ID = "REPLACE_WITH_YOUR_EXTENSION_ID";

    let isSignup = new URLSearchParams(location.search).get("signup") === "1";
    const $ = (id) => document.getElementById(id);
    function setMode() {
      $("title").textContent = isSignup ? "Create your Knox account" : "Sign in to Knox";
      $("emailBtn").textContent = isSignup ? "Create account" : "Sign in";
      $("toggle").innerHTML = isSignup
        ? 'Already have an account? <a id="toggleLink">Sign in</a>'
        : 'New here? <a id="toggleLink">Create an account</a>';
      $("toggleLink").onclick = () => { isSignup = !isSignup; setMode(); };
    }
    setMode();

    async function handoff(user) {
      const token = await user.getIdToken();
      let plan = "free";
      try {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) plan = snap.data().plan || "free";
      } catch (e) {}
      const auth_payload = {
        uid: user.uid,
        email: user.email,
        name: user.displayName || (user.email ? user.email.split("@")[0] : "You"),
        token,
        plan,
      };
      // Path A: direct external message (needs externally_connectable in manifest)
      try {
        if (chrome?.runtime?.sendMessage && EXTENSION_ID !== "REPLACE_WITH_YOUR_EXTENSION_ID") {
          chrome.runtime.sendMessage(EXTENSION_ID, { type: "KNOX_AUTH", auth: auth_payload });
        }
      } catch (e) {}
      // Path B: window.postMessage — picked up by the content script bridge
      window.postMessage({ type: "KNOX_AUTH", auth: auth_payload }, location.origin);

      $("signinCard").style.display = "none";
      $("successCard").style.display = "block";
    }

    $("googleBtn").onclick = async () => {
      $("err").textContent = "";
      try {
        const res = await signInWithPopup(auth, new GoogleAuthProvider());
        await handoff(res.user);
      } catch (e) { $("err").textContent = friendly(e); }
    };
    $("emailBtn").onclick = async () => {
      $("err").textContent = "";
      const email = $("email").value.trim();
      const pw = $("password").value;
      if (!email || !pw) { $("err").textContent = "Enter your email and password."; return; }
      try {
        const fn = isSignup ? createUserWithEmailAndPassword : signInWithEmailAndPassword;
        const res = await fn(auth, email, pw);
        await handoff(res.user);
      } catch (e) { $("err").textContent = friendly(e); }
    };
    function friendly(e) {
      const c = e?.code || "";
      if (c.includes("wrong-password") || c.includes("invalid-credential")) return "Wrong email or password.";
      if (c.includes("user-not-found")) return "No account with that email.";
      if (c.includes("email-already-in-use")) return "That email already has an account — try signing in.";
      if (c.includes("weak-password")) return "Password should be at least 6 characters.";
      if (c.includes("popup-closed")) return "Sign-in cancelled.";
      return "Something went wrong. Please try again.";
    }
  </script>
</body>
</html>
